services:
  - type: web
    name: reaper-empire-api
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
    healthCheckPath: /api/healthz
    pullRequestPreviewsEnabled: true
  - type: static
    name: reaper-empire-bot
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/reaper-empire run build
    staticPublishPath: ./artifacts/reaper-empire/dist/public
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: reaper-empire-api
          type: web
          property: url
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /assets/(.*)
        destination: /assets/$1
      - type: rewrite
        source: /.*
        destination: /index.html
